<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Analyst Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <!-- File Parsing Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">E</div>
            <span>Education Analyst</span>
        </div>

        <button id="new-chat-btn" class="btn btn-primary btn-block" style="margin-bottom: 1.5rem;">+ 新建对话</button>

        <div class="setup-details">
            <!-- Connecting History Section -->
            <div class="section-title">历史记录</div>
            <div id="history-list" class="history-list">
                <!-- History items will be injected here -->
            </div>

            <div class="section-divider" style="margin: 1.5rem 0; border-top: 1px solid var(--border-color);"></div>

            <div class="section-title">设置</div>
            <div class="form-group">
                <label for="provider-select">AI Provider</label>
                <select id="provider-select" class="form-input">
                    <option value="openai">OpenAI</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="gemini">Google Gemini</option>
                    <option value="zhipu">Zhipu AI (智谱)</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

            <div class="form-group" id="search-config-container" style="display: none;">
                <!-- Zhipu Search Toggle -->
                <div id="zhipu-search-config" style="display: none;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="zhipu-search-enable" checked>
                        <span>开启联网搜索 (Web Search)</span>
                    </label>
                </div>

                <!-- Gemini Search Toggle -->
                <div id="gemini-search-config" style="display: none;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="gemini-search-enable">
                        <span>开启 Google 搜索 (Grounding)</span>
                    </label>
                </div>
            </div>

            <div class="form-group" id="reasoning-config-container">
                <label class="checkbox-label">
                    <input type="checkbox" id="reasoning-enable">
                    <span>开启深度思考 (Deep Thinking)</span>
                </label>
            </div>

            <div class="form-group">

                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="password" id="api-key" class="form-input" placeholder="sk-..." autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="base-url">Base URL</label>
                    <input type="text" id="base-url" class="form-input" placeholder="https://api.openai.com/v1"
                        value="https://api.openai.com/v1">
                </div>

                <div class="form-group">
                    <label for="model-name">Model Name</label>
                    <input type="text" id="model-name" class="form-input" placeholder="gpt-4o" value="gpt-4o">
                </div>

                <button id="save-settings" class="btn btn-primary btn-block">保存设置</button>
            </div>
        </div>

        <div class="status-indicator">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">检查中...</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div id="chat-container" class="chat-container">
            <!-- Messages will be inserted here by script.js -->
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="chat-input" class="chat-input"
                    placeholder="请输入业务背景、关键数据或遇到的问题... (Shift+Enter 换行)"></textarea>

                <!-- File Input -->
                <input type="file" id="file-input" style="display: none;"
                    accept=".txt,.csv,.md,.json,.pdf,.docx,.xlsx,.xls">
                <button id="upload-btn" class="upload-btn" title="上传文件">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg>
                </button>
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" class="send-icon">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
                <button id="stop-btn" class="stop-btn" style="display: none;">
                    <svg viewBox="0 0 24 24" class="stop-icon">
                        <rect x="6" y="6" width="12" height="12" />
                    </svg>
                </button>
            </div>
            <div id="file-preview" class="file-preview"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
