<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售薪酬绩效测算器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1>销售薪酬绩效测算器</h1>
            <p>输入关键指标，即时测算提成与奖金</p>
        </header>

        <!-- Result Section (Top) -->
        <section class="card result-section">
            <h2><span class="icon">💰</span> 测算结果</h2>

            <!-- Group 1: Overview -->
            <div class="result-group">
                <h3>核心指标</h3>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">总人数</span>
                        <span class="value" id="total-people">0</span>
                    </div>
                    <div class="result-item">
                        <span class="label">净 GMV</span>
                        <span class="value" id="total-net-gmv">¥ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">产品毛利</span>
                        <span class="value" id="gross-profit">¥ 0.00</span>
                    </div>
                    <div class="result-item highlight-profit">
                        <span class="label">剩余利润</span>
                        <span class="value" id="remaining-profit">¥ 0.00</span>
                    </div>
                </div>
            </div>

            <!-- Group 2: Costs -->
            <div class="result-group">
                <h3>成本分析</h3>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">市场投放成本</span>
                        <span class="value" id="total-marketing-spend">¥ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">市场人力成本</span>
                        <span class="value" id="market-labor-cost-display">¥ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">销售固定工资</span>
                        <span class="value" id="sales-fixed-salary-display">¥ 0.00</span>
                    </div>
                    <div class="result-item">
                        <span class="label">销售总提成</span>
                        <span class="value" id="total-commission">¥ 0.00</span>
                    </div>
                </div>
            </div>

            <!-- Group 3: ROI -->
            <div class="result-group">
                <h3>ROI 效率</h3>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="label">ROI (投放)</span>
                        <span class="value" id="weighted-roi">--</span>
                    </div>
                    <div class="result-item">
                        <span class="label">ROI1 (投放+人力)</span>
                        <span class="value" id="roi1">--</span>
                    </div>
                    <div class="result-item">
                        <span class="label">ROI2 (全成本)</span>
                        <span class="value" id="roi2">--</span>
                    </div>
                    <div class="result-item highlight">
                        <span class="label">销售总提点</span>
                        <span class="value" id="sales-comm-rate">--%</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Control Bar (Middle) -->
        <section class="control-bar">
            <div class="settings-grid">
                <div class="input-group">
                    <label for="margin">产品毛利 (%)</label>
                    <div class="input-wrapper">
                        <input type="number" id="margin" placeholder="20" step="0.1" value="20">
                        <span class="unit">%</span>
                    </div>
                </div>
                <div class="input-group">
                    <label for="market-cost">市场人力成本 (¥)</label>
                    <div class="input-wrapper">
                        <input type="number" id="market-cost" placeholder="0" step="1000" value="0">
                    </div>
                </div>
                <div class="input-group">
                    <label for="base-salary">销售固定薪资 (¥/人)</label>
                    <div class="input-wrapper">
                        <input type="number" id="base-salary" placeholder="5000" step="500" value="0">
                    </div>
                </div>
            </div>
            <button id="calculate-btn" class="btn-primary">开始测算</button>
        </section>

        <!-- Matrix Visualization (Bottom) -->
        <section class="card matrix-section">
            <h2><span class="icon">🕸️</span> 人员分布矩阵 (GMV 行 x ROI 列) - <small>点击表头修改范围</small></h2>
            <div class="matrix-wrapper">
                <div class="matrix-container">
                    <div class="matrix-header-row">
                        <div class="matrix-cell header-cell corner">GMV \ ROI</div>
                        <!-- ROI Headers will be injected here -->
                        <button id="add-col-btn" class="add-btn col-btn" title="添加 ROI 列">+</button>
                    </div>
                    <div id="matrix-body">
                        <!-- Matrix rows will be injected here -->
                    </div>
                </div>
                <button id="add-row-btn" class="add-btn row-btn" title="添加 GMV 行">+</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
